name: Deploy to Replicate
on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/share/boost
          sudo apt-get clean
          docker system prune -af

      - name: Install Cog
        run: |
          sudo curl -L "https://github.com/replicate/cog/releases/latest/download/cog_linux_x86_64" -o /usr/local/bin/cog
          sudo chmod +x /usr/local/bin/cog

      - name: Push to Replicate
        env:
          REPLICATE_API_TOKEN: ${{ secrets.REPLICATE_API_TOKEN }}
        run: |
          echo "${{ secrets.REPLICATE_API_TOKEN }}" | docker login r8.im -u token --password-stdin
          cog push r8.im/effame/stockgen-upscaler
