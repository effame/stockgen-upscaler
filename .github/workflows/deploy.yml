name: Deploy to Replicate

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Cog
        run: |
          sudo curl -L "https://github.com/replicate/cog/releases/latest/download/cog_linux_x86_64" -o /usr/local/bin/cog
          sudo chmod +x /usr/local/bin/cog

      - name: Push model to Replicate
        env:
          REPLICATE_API_TOKEN: ${{ secrets.REPLICATE_API_TOKEN }}
        run: cog push r8.im/pataweenup-prog/stockgen-upscaler
