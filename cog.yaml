build:
  gpu: true
  cuda: "12.1"
  system_packages:
    - "libvulkan1"
    - "libvulkan-dev"
    - "vulkan-tools"
    - "libgl1-mesa-glx"
    - "libglib2.0-0"
  python_version: "3.11"
  python_requirements: requirements.txt
  run:
    - mkdir -p /src/models /src/bin
    - curl -SL "https://github.com/upscayl/upscayl/releases/download/v5.0.5/upscayl-bin-5.0.5-linux.zip" -o /tmp/upscayl.zip
    - cd /tmp && unzip -o upscayl.zip && mv upscayl-bin-5.0.5-linux/upscayl-bin /src/bin/upscayl-bin && chmod +x /src/bin/upscayl-bin && rm -rf /tmp/upscayl*
    - curl -SL "https://huggingface.co/upscayl/upscayl-models-5/resolve/main/high-fidelity-4x.zip" -o /tmp/models.zip
    - cd /tmp && unzip -o models.zip -d /src/models/ && rm -f /tmp/models.zip

predict: "predict.py:Predictor"
