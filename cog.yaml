build:
  gpu: true
  cuda: "12.1"
  system_packages:
    - "libvulkan1"
    - "libvulkan-dev"
    - "vulkan-tools"
    - "libgl1-mesa-glx"
    - "libglib2.0-0"
    - "unzip"
  python_version: "3.11"
  python_requirements: requirements.txt
  run:
    - mkdir -p /src/bin /src/models/upscayl-standard-4x
    - curl -SL "https://github.com/upscayl/upscayl-ncnn/releases/download/20251207-174704/upscayl-bin-20251207-174704-linux.zip" -o /tmp/upscayl.zip
    - cd /tmp && unzip -o upscayl.zip && mv upscayl-bin-20251207-174704-linux/upscayl-bin /src/bin/upscayl-bin && chmod +x /src/bin/upscayl-bin && rm -rf /tmp/upscayl*
    - curl -SL "https://raw.githubusercontent.com/upscayl/upscayl/v2.15.0/resources/models/upscayl-standard-4x.param" -o /src/models/upscayl-standard-4x/upscayl-standard-4x.param
    - curl -SL "https://raw.githubusercontent.com/upscayl/upscayl/v2.15.0/resources/models/upscayl-standard-4x.bin" -o /src/models/upscayl-standard-4x/upscayl-standard-4x.bin

predict: "predict.py:Predictor"
