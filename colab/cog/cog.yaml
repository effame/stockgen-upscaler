build:
  gpu: true
  system_packages:
    - "libgl1-mesa-glx"
    - "libglib2.0-0"
    - "unzip"
  python_version: "3.11"
  python_requirements: requirements.txt
  run:
    - pip install torch==2.2.0 torchvision==0.17.0 --index-url https://download.pytorch.org/whl/cu121
    - pip install nvidia-cuda-nvrtc==13.0.88
    - pip install realesrgan
    - curl -o /usr/local/bin/pget -L "https://github.com/replicate/pget/releases/download/v0.8.2/pget_linux_x86_64" && chmod +x /usr/local/bin/pget
    - mkdir -p /src/weights && pget "https://huggingface.co/nateraw/real-esrgan/resolve/main/RealESRGAN_x2plus.pth" /src/weights/RealESRGAN_x2plus.pth && pget "https://github.com/xinntao/Real-ESRGAN/releases/download/v0.1.0/RealESRGAN_x4plus.pth" /src/weights/RealESRGAN_x4plus.pth && pget "https://huggingface.co/Kim2091/UltraSharp/resolve/main/4x-UltraSharp.pth" /src/weights/4x-UltraSharp.pth && pget "https://github.com/xinntao/Real-ESRGAN/releases/download/v0.2.2.4/RealESRGAN_x4plus_anime_6B.pth" /src/weights/RealESRGAN_x4plus_anime_6B.pth

predict: "predict.py:Predictor"
